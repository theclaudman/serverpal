<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Сервисы 1С</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-body: #0f0f1a;
            --bg-card: rgba(255,255,255,0.03);
            --bg-secondary: rgba(255,255,255,0.05);
            --text-primary: #e4e4e4;
            --text-muted: #888;
            --border-color: rgba(255,255,255,0.05);
            --border-light: rgba(255,255,255,0.08);
            --accent-green: #4ade80;
            --primary-gradient: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            font-size: 2.8em;
            color: var(--accent-green);
            display: block;
            margin-bottom: 12px;
        }
        .login-logo h1 {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .login-logo p {
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1em;
            pointer-events: none;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95em;
            transition: all 0.2s ease;
        }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 24px 0;
        }

        .field-hint {
            font-size: 0.78em;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.35);
        }

        .error-msg {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: #f87171;
            font-size: 0.88em;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.88em;
            color: var(--text-muted);
        }
        .login-link a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <span class="icon"><i class="bi bi-person-plus-fill"></i></span>
            <h1>Регистрация</h1>
            <p>Создайте аккаунт для доступа к сервисам</p>
        </div>

        /*@@ERROR_BLOCK@@*/

        <form method="post" action="/register">
            <div class="form-group">
                <label class="form-label">Адрес сервера 1С</label>
                <div class="input-wrapper">
                    <i class="bi bi-hdd-network input-icon"></i>
                    <input class="form-input" type="text" name="onec_base_url"
                           placeholder="http://192.168.1.100/unf_dashboard"
                           value="/*@@ONEC_BASE_URL@@*/" required autofocus>
                </div>
                <div class="field-hint">Полный адрес публикации 1С (http://ip/имя_публикации)</div>
            </div>

            <hr class="divider">

            <div class="form-group">
                <label class="form-label">Логин</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input class="form-input" type="text" name="username"
                           placeholder="Администратор" value="/*@@USERNAME@@*/" required>
                </div>
                <div class="field-hint">Логин пользователя в 1С</div>
            </div>

            <div class="form-group">
                <label class="form-label">Пароль</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input class="form-input" type="password" name="password"
                           placeholder="••••••••">
                </div>
                <div class="field-hint">Пароль пользователя в 1С</div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="bi bi-person-check"></i> Зарегистрироваться
            </button>
        </form>

        <div class="login-link">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>
</body>
</html>
