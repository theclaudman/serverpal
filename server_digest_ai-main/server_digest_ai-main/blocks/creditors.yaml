# Блок: Кредиторская задолженность
# Кому должны мы — поставщики

id: creditors
name: "Кредиторка"
enabled: true
priority: 5

source:
  entity: "AccumulationRegister_РасчетыСПоставщиками/Balance"
  type: balance
  fields:
    - Контрагент_Key
    - Договор_Key
    - СуммаBalance
    - ТипРасчетов
  filter: "СуммаBalance gt 0"
  orderby: "СуммаBalance desc"
  period: none

resolve:
  - field: "Контрагент_Key"
    catalog: "Catalog_Контрагенты"

mask:
  - field: "Контрагент_Key"
    prefix: "Контрагент"
    type: guid_ref

aggregation:
  type: group_sum
  group_by: "Контрагент_Key"
  sum_field: "СуммаBalance"
  max_rows: 20

template: |
  КРЕДИТОРКА: {total} ({count} поставщиков)
    Крупнейшие обязательства:
    {top_items}

hide_if_empty: false

depends_on: []
