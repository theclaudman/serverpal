services:
  dashboard:
    build:
      context: .
      dockerfile: Server_fastapi_1c-main/Server_fastapi_1c-main/Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      AI_SERVICE_URL: http://ai-bridge:8001
      DIGEST_SERVICE_URL: http://digest-api:8002
      SERVICE_API_KEY: ${SERVICE_API_KEY:?set SERVICE_API_KEY in .env}
      PRICE_TYPE_RETAIL: ${PRICE_TYPE_RETAIL:?set PRICE_TYPE_RETAIL in .env}
      PRICE_TYPE_WHOLESALE: ${PRICE_TYPE_WHOLESALE:?set PRICE_TYPE_WHOLESALE in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      DASHBOARD_DB_PATH: /data/users.db
    ports:
      - "9001:9001"
    volumes:
      - dashboard_data:/data
      - dashboard_logs:/app/logs
    depends_on:
      ai-bridge:
        condition: service_healthy
      digest-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9001/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-bridge:
    build:
      context: .
      dockerfile: server_ai-main/server_ai-main/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:?set OPENAI_BASE_URL in .env}
      OPENAI_MODEL: ${OPENAI_MODEL:?set OPENAI_MODEL in .env}
      SERVICE_API_KEY: ${SERVICE_API_KEY:?set SERVICE_API_KEY in .env}
      MAX_TOOL_ITERATIONS: ${MAX_TOOL_ITERATIONS:-5}
      DATA_DIR: /data/connected_bases
      LOGS_DIR: /app/logs
      KNOWLEDGE_BASE_FILE: knowledge_base.txt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ai_data:/data
      - ai_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  digest-api:
    build:
      context: .
      dockerfile: server_digest_ai-main/server_digest_ai-main/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      DIGEST_OPENAI_BASE_URL: ${DIGEST_OPENAI_BASE_URL:-https://api.hydraai.ru/v1}
      DIGEST_OPENAI_MODEL: ${DIGEST_OPENAI_MODEL:-gpt-4o}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:?set LMSTUDIO_BASE_URL in .env}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:?set LMSTUDIO_MODEL in .env}
      DIGEST_REQUEST_TIMEOUT: ${DIGEST_REQUEST_TIMEOUT:-120}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS in .env}
      SERVICE_API_KEY: ${SERVICE_API_KEY:?set SERVICE_API_KEY in .env}
      DIGEST_HOST: 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - digest_data:/app/data
      - digest_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  dashboard_data:
  dashboard_logs:
  ai_data:
  ai_logs:
  digest_data:
  digest_logs:
